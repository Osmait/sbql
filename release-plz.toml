[workspace]
# We want git tags + GitHub releases, not crates.io publishing.
publish = false
git_only = true
git_tag_name = "{{ package }}-v{{ version }}"
git_release_name = "{{ package }}-v{{ version }}"

# Run `release` only when the merged commit comes from a release-plz PR.
release_always = false

# Keep default branch naming explicit for auto-merge workflow lookup.
pr_branch_prefix = "release-plz-"
