included:
  - sbql-macos
  - sbql-macosTests
  - sbql-macosUITests

excluded:
  - sbql-macos/Generated

identifier_name:
  min_length: 1
  max_length: 60

type_name:
  min_length: 3
  max_length: 60
  allowed_symbols: ["_"]

line_length:
  warning: 150
  error: 200

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 300
  error: 500

function_parameter_count:
  warning: 8
  error: 10

cyclomatic_complexity:
  warning: 20
  error: 30

large_tuple:
  warning: 4

disabled_rules:
  - trailing_comma
  - static_over_final_class
  - opening_brace
